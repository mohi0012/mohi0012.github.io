<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF=8">
    <title>Week 2 - HTML Text Semantics</title>
</head>

<body>
    <!-- comment block - control + / or command + / -->
    <!-- Site Header -->
    <header>
        <h1>Reggie's Coffee Shop</h1>
        <nav>Navigation</nav>
    </header>
    <main>
        <article>
            <h2>Our Story</h2>
            <blockquote>
                We love Coffee <cite>- Reggie and Maria</cite>
            </blockquote> 
            <p>
                We are <em>family owned business</em>. Reggie is the <abbr title="Chef Executive Officer">CEO</abbr>
            </p>
        </article>
    </main>
    <footer></footer>
</body>

</html>
